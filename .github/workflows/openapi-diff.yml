name: OpenAPI Diff

on:
  pull_request:
    branches:
      - master
    paths:
      - ".vendored/rootly-api/swagger.json"
      - ".github/workflows/openapi-diff.yml"

jobs:
  diff:
    name: OpenAPI Diff
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Install oasdiff
        env:
          OASDIFF_VERSION: 1.13.3 # renovate: datasource=github-releases depName=oasdiff/oasdiff
        run: |
          curl -fsSL -o /tmp/oasdiff.tar.gz \
            "https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/oasdiff.tar.gz -C /usr/local/bin oasdiff

      - name: Get base spec
        env:
          PR_BASE_SHA: "${{ github.event.pull_request.base.sha }}"
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="$PR_BASE_SHA"
          fi
          if git show "${BASE_REF}:.vendored/rootly-api/swagger.json" > /tmp/base-swagger.json 2>/dev/null; then
            echo "BASE_SPEC_EXISTS=true" >> "$GITHUB_ENV"
          else
            echo "BASE_SPEC_EXISTS=false" >> "$GITHUB_ENV"
          fi

      - name: OpenAPI changelog
        if: env.BASE_SPEC_EXISTS == 'true'
        run: |
          CHANGELOG=$(oasdiff changelog --format markdown /tmp/base-swagger.json .vendored/rootly-api/swagger.json || true)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="_No API changes detected._"
          fi
          {
            echo "$CHANGELOG"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "$CHANGELOG" > /tmp/changelog.md

      - name: Comment changelog on PR
        if: env.BASE_SPEC_EXISTS == 'true'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.readFileSync('/tmp/changelog.md', 'utf8').trim();
            const marker = '<!-- openapi-changelog -->';
            const body = `${marker}\n${changelog}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: OpenAPI breaking changes
        if: env.BASE_SPEC_EXISTS == 'true'
        run: oasdiff breaking /tmp/base-swagger.json .vendored/rootly-api/swagger.json --format githubactions
        continue-on-error: true
